name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: RuboCop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop

  test:
    name: RSpec (full suite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: RSpec via Docker Compose
        run: docker compose run --rm --build test bundle exec rspec

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
