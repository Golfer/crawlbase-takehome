# Reverse proxy configuration for the Crawlbase take-home.
#
# TODO: complete this so nginx accepts public traffic and forwards it
#       to the Sinatra app (compose service "app", port 4567).
#
# Optional (not required) — bonus points for edge behavior such as:
#   - forwarding the real client IP upstream (X-Real-IP / X-Forwarded-For)
#   - adding a custom response header
#
# server {
#     listen 80;
#     # ...
# }

upstream crawlbase_backend {
    server app:4567;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 1m;

    location / {
        proxy_pass http://crawlbase_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    add_header X-Served-By nginx always;
}